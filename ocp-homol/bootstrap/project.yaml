apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ocp-homol
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  description: Projeto para pipelines CI/CD

  sourceRepos:
    - git@github.com:luissobrinhoeds/gitops.git
    #- ssh://git@gogs.fsfx.org.br:2222/srvopenshift/ocp-gitops-platform.git

  destinations:
    - namespace: '*'
      name: in-cluster

  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'