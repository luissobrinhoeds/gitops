apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ocp-homol-projects
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default

  source:
    repoURL: git@github.com:luissobrinhoeds/gitops.git
    #repoURL: ssh://git@gogs.fsfx.org.br:2222/srvopenshift/ocp-gitops-platform.git
    targetRevision: HEAD
    path: ocp-homol/projects/
    directory:
      recurse: true

  destination:
    name: in-cluster
    namespace: openshift-gitops

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
