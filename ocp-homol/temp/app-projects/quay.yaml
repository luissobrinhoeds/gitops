apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quay-register
spec:
  project: default

  source:
    repoURL: git@github.com:luissobrinhoeds/gitops.git
    #repoURL: ssh://git@gogs.fsfx.org.br:2222/srvopenshift/ocp-gitops-platform.git
    targetRevision: HEAD
    path: iac/ocp-config/operators/quay-register/
    directory:
      recurse: true

  destination:
    name: ocp-homol
    namespace: openshift-operators

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
  
  ignoreDifferences:
    - group: ""
      kind: Secret
      namespace: quay
      jsonPointers:
        - /data
