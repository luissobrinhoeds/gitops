apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexus
spec:
  project: default

  source:
    repoURL: git@github.com:luissobrinhoeds/gitops.git
    targetRevision: HEAD
    path: apps/nexus/

  destination:
    server: https://a7c9bff3489fa4818aed9597949d423b-7ecc39a3f505bd14.elb.us-east-1.amazonaws.com:6443
    namespace: nexus

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
