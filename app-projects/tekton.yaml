apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton
spec:
  project: default

  source:
    repoURL: git@github.com:luissobrinhoeds/gitops.git
    targetRevision: HEAD
    path: apps/tekton/cicd-pipelines/raw
    directory:
      recurse: true

  destination:
    name: ocp-homol
    namespace: openshift

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
