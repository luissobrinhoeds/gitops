apiVersion: v1
kind: Secret
metadata:
  name: quay-config-bundle
  namespace: quay
  annotations:
    argocd.argoproj.io/sync-wave: "2"
type: Opaque
stringData:
  config.yaml: |
    AUTHENTICATION_TYPE: Database
    SUPER_USERS:
    - quayadmin
    DEFAULT_TAG_EXPIRATION: 8w
    SERVER_HOSTNAME: quay.apps.ocp-homol.sandbox2671.opentlc.com
    SETUP_COMPLETE: true
    REGISTRY_TITLE: Red Hat Quay
    REGISTRY_TITLE_SHORT: Registro de imagens de container
    TAG_EXPIRATION_OPTIONS:
    - 2w
    - 4w
    - 8w
    - 12w
    TEAM_RESYNC_STALE_TIME: 60m

    DISTRIBUTED_STORAGE_CONFIG:
      default:
        - S3Storage
        - access_key: admin
          secret_key: QmzQsDm3SWC8XRjEO98l2JdzAOeTqJ
          bucket_name: quay
          hostname: minio.minio.svc
          port: 9000
          is_secure: true
          storage_path: /datastorage/registry
          s3_region: us-east-1

    DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS: []
    DISTRIBUTED_STORAGE_PREFERENCE:
      - default

    FEATURE_USER_CREATION: true
    EXTERNAL_TLS_TERMINATION: true