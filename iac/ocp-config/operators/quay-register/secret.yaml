apiVersion: v1
kind: Secret
metadata:
  name: quay-config-bundle
  namespace: quay
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  config.yaml: |
    DISTRIBUTED_STORAGE_CONFIG:
      default:
        - LocalStorage
        - storage_path: /datastorage/registry

    DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS: []
    DISTRIBUTED_STORAGE_PREFERENCE:
      - default

    SERVER_HOSTNAME: quay.apps.ocp-homol.sandbox2414.opentlc.com

    SETUP_COMPLETE: true