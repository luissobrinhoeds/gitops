apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ocp-homol-config
  namespace: openshift-gitops
spec:
  project: default

  source:
    repoURL: git@github.com:luissobrinhoeds/gitops.git
    targetRevision: HEAD
    path: ocp-config/
    directory:
      recurse: true

  destination:
    name: ocp-homol
    namespace: openshift-gitops

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
