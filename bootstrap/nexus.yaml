apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexus-helm
  namespace: openshift-gitops
spec:
  project: default

  source:
    repoURL: https://github.com/luissobrinhoeds/nexus.git
    targetRevision: HEAD
    path: apps/
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
